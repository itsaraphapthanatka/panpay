name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: panpay
          POSTGRES_PASSWORD: panpay
          POSTGRES_DB: panpay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U panpay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://panpay:panpay@localhost:5432/panpay_test
      JWT_SECRET: ci-test-secret-key-of-sufficient-length-0123456789
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Thai fonts (for PDF receipt rendering)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-thai-tlwg fonts-noto-core
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run pytest
        working-directory: backend
        run: pytest

  frontend:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t panpay-backend ./backend
      - name: Build frontend image
        run: docker build -t panpay-frontend --build-arg VITE_API_URL=http://localhost:8000 ./frontend
