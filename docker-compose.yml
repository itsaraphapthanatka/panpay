services:
  db:
    image: postgres:16-alpine
    container_name: panpay-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: panpay
      POSTGRES_PASSWORD: panpay
      POSTGRES_DB: panpay
    # ไม่ map host port — backend เข้าถึง db ผ่าน docker network (db:5432) อยู่แล้ว
    # (host 5433 ชนกับ pet_transport_db ของอีกโปรเจกต์)
    volumes:
      - panpay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panpay"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: panpay-backend
    restart: unless-stopped
    # Loads SMTP_* / LINE_* (and other) secrets from the gitignored backend/.env.
    # Keys also set under `environment:` below take precedence (container networking).
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://panpay:panpay@db:5432/panpay
      JWT_SECRET: change-me-in-production-please-0123456789
      CHECKOUT_BASE_URL: https://punpay.petgo.asia
      CORS_ORIGINS: https://punpay.petgo.asia
      SLIP_PROVIDER: dev
      DEV_AUTO_VERIFY: "true"
      RUN_SCHEDULER: "true"          # in-process daily renewal job (single instance)
      SCHEDULER_INTERVAL_HOURS: "24"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: panpay-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:5173:80"

volumes:
  panpay_pgdata:
