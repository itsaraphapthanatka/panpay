server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Admin console — a separate bundle (admin.html). Client-side routes under
    # /admin/* (login, merchants, ...) all fall back to admin.html.
    location /admin {
        try_files $uri $uri/ /admin.html;
    }

    # Storefront / merchant dashboard SPA: serve index.html for client-side
    # routes (/pay/:id, /login, /transactions, ...)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
